<link rel="stylesheet" href="prototype/colors_and_type.css">
<style>
  :root {
    --bg-layout: #F5F6FA;
    --fg: rgba(2,11,23,0.88);
    --scrollbar: #D0D4DB;
    --modal-backdrop: rgba(0,0,0,0.45);
  }
  html[data-theme="dark"] {
    --bg-layout: #0F1419;
    --fg: rgba(245,247,250,0.92);
    --scrollbar: #2A3038;
    --modal-backdrop: rgba(0,0,0,0.7);
    color-scheme: dark;
  }
  html, body, #root { margin:0; padding:0; height:100%; }
  body { background:var(--bg-layout); font-family:'Cerebri Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color:var(--fg); transition: background .2s, color .2s; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  a { cursor:pointer; }
</style>
